name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dev deps
        run: pip install -e "python/[dev]"

      - name: Ruff check
        run: ruff check python/

      - name: Ruff format check
        run: ruff format --check python/

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo fmt check
        run: cargo fmt --check

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/app

      - name: Svelte check
        run: npm run check
        working-directory: frontend/app

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dev deps
        run: pip install -e "python/[dev]"

      - name: Run Python tests with coverage
        run: pytest python/tests/ -x --tb=short -m "not external" --cov=atlas_weave --cov-fail-under=60

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Rust tests
        run: cargo test --workspace

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/app

      - name: Run frontend tests
        run: npm test
        working-directory: frontend/app

  build:
    needs: [lint, test-python, test-rust, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/app

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Tauri app (debug)
        run: cargo tauri build --debug

  e2e:
    needs: [build]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/app

      - name: Install E2E deps
        run: npm ci
        working-directory: tests/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Run E2E smoke tests
        run: npx playwright test
        working-directory: tests/e2e
